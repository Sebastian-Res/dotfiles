configs:
  - name: bash
    files:
      - src_path: "./configurations/bash/.bashrc"
        target_folder: "~/"
      - src_path: "./configurations/bash/.bash_aliases"
        target_folder: "~/"

  - name: nvim
    files:
      - src_path: "./configurations/nvim/"
        target_folder: "~/.config/"

  - name: tmux
    files:
      - src_path: "./configurations/.tmux.conf"
        target_folder: "~/"

# Either take whole folder instead of only config or check folder exists when linking
  - name: kitty
    files:
      - src_path: "./configurations/kitty/kitty.conf"
        target_folder: "~/.config/kitty/"
